services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: synccal
      POSTGRES_USER: synccal_user
      POSTGRES_PASSWORD: synccal_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synccal_user -d synccal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data: